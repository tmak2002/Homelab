services:
  caddy:
    container_name: caddy
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    ports:
      - 80:80
      - 443:443
    networks:
      - core
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    restart: unless-stopped
    deploy:
      labels:
        caddy.email: torben@tmak2002.dev
      placement:
        constraints:
          - node.role == manager
      replicas: 1
      restart_policy:
        condition: any


networks:
  core:
    driver: overlay

volumes:
  caddy_data: {}
