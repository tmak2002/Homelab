---
- name: Create proxitok directory
  ansible.builtin.file:
    path: /opt/proxitok
    state: directory
    mode: "0755"
  tags:
    - setup

- name: Setup proxitok
  ansible.builtin.template:
    src: compose.yml.j2
    dest: /opt/proxitok/compose.yml
    mode: "0644"
  notify: Restart proxitok
  tags:
    - setup
    - update

- name: Update caddy config
  ansible.builtin.template:
    src: proxitok.j2
    dest: /srv/caddy/sites/proxitok
    mode: "0644"
  notify: Restart caddy
  tags:
    - setup
    - update
