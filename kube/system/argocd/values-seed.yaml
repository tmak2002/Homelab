argo-cd:
  server:
    metrics: &metrics
      enabled: false
      serviceMonitor:
        enabled: false
  controller:
    metrics: *metrics
  repoServer:
    metrics: *metrics
  redis:
    metrics: *metrics
argocd-apps:
  applicationsets:
    root:
      generators:
        - git:
            repoURL: &repoURL https://github.com/tmak2002/Homelab.git
            revision: &revision v3-dev
            directories:
              - path: kube/system/*
              - path: kube/apps/*
      template:
        spec:
          source:
            repoURL: *repoURL
            targetRevision: *revision
